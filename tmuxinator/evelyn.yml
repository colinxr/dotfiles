      layout: bec0,179x53,0,0,3
      panes:
        - lazygit
  - Lazydocker: lazydocker
  - web:
      root: ~/Evelyn/evelynhq/apps/web
      panes:
        -
  - api:
      root: ~/Evelyn/evelynhq/apps/api
      panes:
        -
  - shell:
      root: ~/Evelyn/evelynhq/
      panes:
        - make shell
  - logs:
      root: ~/Evelyn/evelynhq/
      panes:
        - make logs-api
        - make logs
